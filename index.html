<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lions Enrollment</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
}

/* Container */
.container {
  max-width: 400px;
  margin: 30px auto;
  padding: 15px;
}

/* Title */
.title {
  text-align: center;
  font-size: 22px;
  margin-bottom: 20px;
}

/* Question Box */
.box {
  background: white;
  color: black;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
}

/* Question */
.question {
  font-weight: bold;
  margin-bottom: 8px;
}

/* Input */
input, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  background: orange;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="title">🦁 Team Lions Enrollment</div>

<!-- Q1 -->
<div class="box">
  <div class="question">1. YOUR USERNAME</div>
  Answer:
  <input id="username" placeholder="Enter your username">
</div>

<!-- Q2 -->
<div class="box">
  <div class="question">2. HOW MANY IDS DO YOU HAVE?</div>
  Answer:
  <input id="ids" type="number" placeholder="Enter number">
</div>

<!-- Q3 -->
<div class="box">
  <div class="question">3. WHICH TEAM WERE YOU IN BEFORE? (OPTIONAL)</div>
  Answer:
  <textarea id="team" placeholder="Type here or leave blank"></textarea>
</div>

<!-- Q4 -->
<div class="box">
  <div class="question">4. YOUR TELEGRAM ID</div>
  Answer:
  <input id="userid" placeholder="Enter your Telegram ID">
</div>

<button onclick="submitForm()">🚀 Submit Enrollment</button>

</div>

<script>

function submitForm(){

  let username = document.getElementById("username").value;
  let ids = document.getElementById("ids").value;
  let team = document.getElementById("team").value;
  let userid = document.getElementById("userid").value;

  if(!username || !ids || !userid){
    alert("Fill all required fields!");
    return;
  }

  let BOT_TOKEN = "8515413418:AAFf-XrEmawg5YBm_3kJY95nT7eUUZ7d6LY";

  let ADMINS = [
    "1134292389",
    "6667476799",
    "7580298442"
  ];

  let msg = `🦁 NEW ENROLLMENT

👤 Username: ${username}
🆔 UserID: ${userid}
📊 IDs: ${ids}
🏆 Previous Team: ${team || "None"}`;

  // Send to admins
  ADMINS.forEach(id => {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}`);
  });

  // Send to user
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${userid}&text=${encodeURIComponent("🎉 CONGRATULATIONS! You have enrolled in Team Lions. Wait for admin approval.")}`);

  alert("Enrollment Submitted ✅");
}

</script>

</body>
</html>
