<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lions Enrollment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
}

.container {
  max-width: 400px;
  margin: 30px auto;
  padding: 15px;
}

.title {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 20px;
}

.box {
  background: white;
  color: black;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 14px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.question {
  font-weight: 600;
  margin-bottom: 8px;
}

.answer {
  font-size: 13px;
  color: #666;
  margin-bottom: 5px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-family: 'Poppins', sans-serif;
}

button {
  width: 100%;
  padding: 14px;
  background: linear-gradient(45deg, #ff8c00, #ffaa00);
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  color: black;
}
</style>
</head>

<body>

<div class="container">

<div class="title">🦁 Team Lions Enrollment</div>

<div class="box">
  <div class="question">1. YOUR USERNAME</div>
  <div class="answer">Answer:</div>
  <input id="username">
</div>

<div class="box">
  <div class="question">2. HOW MANY IDS DO YOU HAVE?</div>
  <div class="answer">Answer:</div>
  <input id="ids" type="number">
</div>

<div class="box">
  <div class="question">3. WHICH TEAM WERE YOU IN BEFORE? (OPTIONAL)</div>
  <div class="answer">Answer:</div>
  <textarea id="team"></textarea>
</div>

<div class="box">
  <div class="question">4. YOUR TELEGRAM ID</div>
  <div class="answer">Answer:</div>
  <input id="userid">
</div>

<button onclick="submitForm()">🚀 Submit Enrollment</button>

</div>

<script>

function submitForm(){

  let username = document.getElementById("username").value;
  let ids = document.getElementById("ids").value;
  let team = document.getElementById("team").value;
  let userid = document.getElementById("userid").value;

  if(!username || !ids || !userid){
    alert("Fill all required fields!");
    return;
  }

  let BOT_TOKEN = "8515413418:AAFf-XrEmawg5YBm_3kJY95nT7eUUZ7d6LY";

  let ADMINS = [
    "1134292389",
    "6667476799",
    "7580298442"
  ];

  let msg = `✨ *LIONS NEW ENROLLMENT* 🦁

━━━━━━━━━━━━━━━
👤 *Username:* ${username}
🆔 *User ID:* ${userid}
📊 *Total IDs:* ${ids}
🏆 *Previous Team:* ${team || "None"}
━━━━━━━━━━━━━━━

🚀 *New member applied!*`;

  // 🔥 SEND TO ADMINS WITH BUTTON
  ADMINS.forEach(id => {

    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        chat_id: id,
        text: msg,
        parse_mode: "Markdown",
        reply_markup: {
          inline_keyboard: [
            [
              {
                text: "👤 View User",
                url: `tg://user?id=${userid}`
              }
            ]
          ]
        }
      })
    });

  });

  // 🔥 USER MESSAGE
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${userid}&text=${encodeURIComponent("🎉 You have successfully applied for Team Lions! Wait for admin approval.")}`);

  // ✅ RESET FORM
  document.getElementById("username").value = "";
  document.getElementById("ids").value = "";
  document.getElementById("team").value = "";
  document.getElementById("userid").value = "";

  alert("Enrollment Submitted ✅");
}

</script>

</body>
</html>
