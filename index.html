<!DOCTYPE html>
<html>
<head>
  <title>Team Lions Enrollment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:#111;color:white;text-align:center;font-family:sans-serif">

<h2>🦁 Team Lions Enrollment</h2>

<input id="username" placeholder="Your Username"><br><br>

<input id="ids" placeholder="How many IDs do you have"><br><br>

<textarea id="team" placeholder="Which team were you in before? (optional)"></textarea><br><br>

<input id="userid" placeholder="Your Telegram ID (important)"><br><br>

<button onclick="submitForm()">Submit</button>

<script>

function submitForm(){

  let username = document.getElementById("username").value;
  let ids = document.getElementById("ids").value;
  let team = document.getElementById("team").value;
  let userid = document.getElementById("userid").value;

  if(!username || !ids || !userid){
    alert("Fill all required fields!");
    return;
  }

  let BOT_TOKEN = "8515413418:AAFf-XrEmawg5YBm_3kJY95nT7eUUZ7d6LY";

  let ADMINS = [
    "1134292389",
    "6667476799",
    "7580298442"
  ];

  let text = `🦁 NEW ENROLLMENT

👤 Username: ${username}
🆔 UserID: ${userid}
📊 IDs: ${ids}
🏆 Previous Team: ${team || "None"}`;

  // 🔥 SEND TO ADMINS
  ADMINS.forEach(id => {
    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${id}&text=${encodeURIComponent(text)}`);
  });

  // 🔥 SEND TO USER
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${userid}&text=${encodeURIComponent("🎉 CONGRATULATIONS YOU HAVE ENROLLED FOR TEAM LIONS NOW WAIT TILL ADMINS APPROVE YOU")}`);

  alert("Enrollment Submitted ✅");
}

</script>

</body>
  </html>
